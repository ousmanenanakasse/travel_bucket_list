<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Register</title>

    <style>

        body {
            font-family: Arial, sans-serif;
            background-color: #f2f2f2;

            display: flex;
            justify-content: center;
            align-items: center;

            height: 100vh;
            margin: 0;
        }

        .container {
            background-color: white;

            padding: 40px;

            border-radius: 10px;

            width: 350px;

            box-shadow: 0px 0px 10px rgba(5, 8, 197, 0.1);
        }

        h1 {
            text-align: center;
            margin-bottom: 10px;
        }

        h2 {
            text-align: center;
            margin-bottom: 30px;
        }

        label {
            font-weight: bold;
        }

        input {
            width: 100%;

            padding: 10px;

            margin-top: 5px;
            margin-bottom: 20px;

            box-sizing: border-box;
        }

        button {
            width: 100%;

            padding: 10px;

            background-color: black;
            color: white;

            border: none;

            cursor: pointer;
        }

        button:hover {
            background-color: #333;
        }

        p {
            text-align: center;
        }

        a {
            display: block;
            text-align: center;

            margin-top: 10px;
        }

    </style>

</head>

<body>

    <div class="container">

        <h1>Travel Bucket List</h1>

        <h2>Register</h2>

        <form method="POST">

            <label for="username">Username</label>

            <input
                type="text"
                id="username"
                name="username"
                required
            >

            <label for="password">Password</label>

            <input
                type="password"
                id="password"
                name="password"
                required
            >

            <button type="submit">
                Register
            </button>

        </form>

        <br>

        <p>Already have an account?</p>

        <a href="/login">
            Go to Login
        </a>

    </div>

</body>

</html>
