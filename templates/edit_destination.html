<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Destination</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f2f2f2;
            margin: 0;
            padding: 30px;
        }

        .container {
            max-width: 450px;
            margin: auto;
            background-color: white;
            padding: 35px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px rgba(0,0,0,0.1);
        }

        h1 {
            text-align: center;
        }

        label {
            font-weight: bold;
        }

        input, select {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            margin-bottom: 18px;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 10px;
            background-color: black;
            color: white;
            border: none;
            cursor: pointer;
        }

        button:hover {
            background-color: #333;
        }

        a {
            display: block;
            text-align: center;
            margin-top: 20px;
        }
    </style>
</head>

<body>

    <div class="container">

        <h1>Edit Destination</h1>

        <form method="POST">

            <label for="name">Destination Name</label>
            <input type="text" id="name" name="name" value="{{ destination['name'] }}" required>

            <label for="country">Country</label>
            <input type="text" id="country" name="country" value="{{ destination['country'] }}" required>

            <label for="reason">Reason to Visit</label>
            <input type="text" id="reason" name="reason" value="{{ destination['reason'] }}" required>

            <label for="priority">Priority</label>
            <select id="priority" name="priority">
                <option {% if destination['priority'] == 'Low' %}selected{% endif %}>Low</option>
                <option {% if destination['priority'] == 'Medium' %}selected{% endif %}>Medium</option>
                <option {% if destination['priority'] == 'High' %}selected{% endif %}>High</option>
            </select>

            <label for="status">Status</label>
            <select id="status" name="status">
                <option {% if destination['status'] == 'Planned' %}selected{% endif %}>Planned</option>
                <option {% if destination['status'] == 'Visited' %}selected{% endif %}>Visited</option>
            </select>

            <label for="budget">Estimated Budget</label>
            <input type="number" id="budget" name="budget" step="0.01" value="{{ destination['budget'] }}" required>

            <button type="submit">Update Destination</button>

        </form>

        <a href="/dashboard">Back to Dashboard</a>

    </div>

</body>
</html>
