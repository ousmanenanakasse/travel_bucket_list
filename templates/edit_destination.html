<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Destination</title>
</head>

<body>

    <header>
        <h1>Edit Destination</h1>
    </header>

    <main>

        <form method="POST">

            <div>
                <label for="name">Destination Name:</label>
                <br>

                <input
                    type="text"
                    id="name"
                    name="name"
                    value="{{ destination['name'] }}"
                    required
                >
            </div>

            <br>

            <div>
                <label for="country">Country:</label>
                <br>

                <input
                    type="text"
                    id="country"
                    name="country"
                    value="{{ destination['country'] }}"
                    required
                >
            </div>

            <br>

            <div>
                <label for="reason">Reason to Visit:</label>
                <br>

                <input
                    type="text"
                    id="reason"
                    name="reason"
                    value="{{ destination['reason'] }}"
                    required
                >
            </div>

            <br>

            <div>
                <label for="priority">Priority:</label>
                <br>

                <select id="priority" name="priority">

                    <option
                        {% if destination['priority'] == 'Low' %}
                            selected
                        {% endif %}
                    >
                        Low
                    </option>

                    <option
                        {% if destination['priority'] == 'Medium' %}
                            selected
                        {% endif %}
                    >
                        Medium
                    </option>

                    <option
                        {% if destination['priority'] == 'High' %}
                            selected
                        {% endif %}
                    >
                        High
                    </option>

                </select>
            </div>

            <br>

            <div>
                <label for="status">Status:</label>
                <br>

                <select id="status" name="status">

                    <option
                        {% if destination['status'] == 'Planned' %}
                            selected
                        {% endif %}
                    >
                        Planned
                    </option>

                    <option
                        {% if destination['status'] == 'Visited' %}
                            selected
                        {% endif %}
                    >
                        Visited
                    </option>

                </select>
            </div>

            <br>

            <div>
                <label for="budget">Estimated Budget:</label>
                <br>

                <input
                    type="number"
                    id="budget"
                    name="budget"
                    step="0.01"
                    value="{{ destination['budget'] }}"
                    required
                >
            </div>

            <br>

            <div>
                <button type="submit">
                    Update Destination
                </button>
            </div>

        </form>

        <br>

        <a href="/dashboard">
            Back to Dashboard
        </a>

    </main>

</body>

</html>
